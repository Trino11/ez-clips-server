name: Build and Push Docker Image to GitHub Packages
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/trino11/ez-clips-server:${{ github.ref_name }}
          cache-from: type=registry,ref=ghcr.io/trino11/ez-clips-server:develop
          cache-to: type=inline
# Uncomment the following line if you want to add a "latest" tag:
# ghcr.io/trino11/ez-clips-server:latest